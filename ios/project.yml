name: ClipToOmniFocus
options:
  bundleIdPrefix: com.spiralocean
  deploymentTarget:
    iOS: "16.4"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: "2386YZLWA2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic

targets:
  ClipToOmniFocus:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spiralocean.cliptoomnifocus
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: App/ClipToOmniFocus.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.spiralocean.cliptoomnifocus
    dependencies:
      - target: ShareExtension
        embed: true

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - Share
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spiralocean.cliptoomnifocus.Share
        INFOPLIST_FILE: Share/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: Share/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.spiralocean.cliptoomnifocus
