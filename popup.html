<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clip to OmniFocus</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="clipper">
      <header class="clipper__header">
        <div class="clipper__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path
              fill="currentColor"
              d="M8 3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9.5a1.5 1.5 0 0 0 1.2-.6l3.5-4.7a1.5 1.5 0 0 0 0-1.8l-3.5-4.7A1.5 1.5 0 0 0 17.5 3H8zm0 2h9.06l2.94 3.94L17.06 13H8V5z"
            />
          </svg>
        </div>
        <div>
          <p class="clipper__eyebrow">Clip to OmniFocus</p>
          <p class="clipper__source" id="site-name">Loading…</p>
        </div>
        <button
          type="button"
          class="clipper__settings"
          id="open-settings"
          title="Settings"
          aria-label="Open settings"
        >
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 8.5A3.5 3.5 0 1 0 12 15.5 3.5 3.5 0 0 0 12 8.5zm8.94 3.5a7.96 7.96 0 0 0-.12-1.5l2.03-1.58-1.92-3.32-2.39.96a8.07 8.07 0 0 0-2.6-1.5L15.5 2h-4l-.84 3.06a8.07 8.07 0 0 0-2.6 1.5l-2.39-.96-1.92 3.32 2.03 1.58c-.08.49-.12.99-.12 1.5s.04 1.01.12 1.5l-2.03 1.58 1.92 3.32 2.39-.96c.78.64 1.65 1.14 2.6 1.5L11.5 22h4l.84-3.06c.95-.36 1.82-.86 2.6-1.5l2.39.96 1.92-3.32-2.03-1.58c.08-.49.12-.99.12-1.5z"
            />
          </svg>
        </button>
      </header>

      <form class="clipper__form" id="clip-form">
        <div class="clipper__actions">
          <button type="submit" class="button button--primary" id="clip-button">
            Clip to OmniFocus
          </button>
          <span class="clipper__hint" aria-hidden="true">
            <kbd>↵</kbd> Enter
          </span>
        </div>

        <label class="field">
          <span class="field__label">Task name</span>
          <input
            class="field__input"
            id="task-name"
            name="name"
            type="text"
            autocomplete="off"
            required
          />
        </label>

        <label class="field">
          <span class="field__label">Note</span>
          <textarea
            class="field__textarea"
            id="task-note"
            name="note"
            rows="3"
            spellcheck="false"
          ></textarea>
        </label>

        <div class="field-row">
          <label class="field field--compact">
            <span class="field__label">Project</span>
            <input
              class="field__input"
              id="task-project"
              name="project"
              type="text"
              placeholder="Optional"
              autocomplete="off"
            />
          </label>

          <label class="field field--compact">
            <span class="field__label">Tag</span>
            <input
              class="field__input"
              id="task-tag"
              name="tag"
              type="text"
              placeholder="Optional"
              autocomplete="off"
            />
          </label>
        </div>

        <label class="checkbox">
          <input type="checkbox" id="task-flag" name="flag" />
          <span>Flag task</span>
        </label>
      </form>

      <p class="clipper__status" id="status" role="status" aria-live="polite"></p>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
