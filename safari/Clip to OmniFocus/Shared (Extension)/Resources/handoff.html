<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Opening OmniFocus…</title>
  </head>
  <body>
    <script>
      const target = new URLSearchParams(location.search).get("target");
      if (target && target.startsWith("omnifocus://")) {
        location.replace(target);
      }
    </script>
  </body>
</html>
